<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Service - JelanTech</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-gradient-yellow">
    <nav class="nav-auth">
      <div class="nav-container">
        <div class="nav-left">
          <h1 class="brand-logo">JelanTech</h1>
        </div>
        <div class="nav-right">
          <a href="home-auth.html" class="nav-link">Home</a>
          <a href="leaderboard.html" class="nav-link">Leaderboard</a>
          <a href="service.html" class="nav-link active">Our Service</a>
           <div class="profile-wrapper">
            <div class="profile-icon" id="profile-trigger">
              <i class="fa-solid fa-user"></i>
            </div>
            <div class="profile-dropdown" id="profile-menu">
              <a href="profile.html"
                ><i class="fa-solid fa-id-card"></i> My Profile</a
              >
              <hr />
              <a href="login.html" class="logout-item"
                ><i class="fa-solid fa-right-from-bracket"></i> Sign Out</a
              >
            </div>
        </div>
      </div>
    </nav>

    <header class="service-header">
      <h1 class="service-title">Schedule Used Cooking Oil Pick-Up</h1>
      <p class="service-subtitle">
        Ready to recycle? Just request pick-up and we will come to you
      </p>
    </header>

    <main class="service-container">
      <div class="service-grid">
        <div class="service-item">
          <div class="service-icon-wrapper">
            <img
              src="ready.png"
              alt="Start to Send Icon"
            />
          </div>
          <a href="pickup-selection.html"
            ><button class="btn-service">Start to Send</button></a
          >
        </div>

        <div class="service-item">
          <div class="service-icon-wrapper">
            <img
              src="map.png"
              alt="Pickup Progress Icon"
            />
          </div>
          <a href="tracking.html">
            <button class="btn-service">Pickup Progress</button>
          </a>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
